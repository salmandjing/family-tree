name = "family-tree-backup"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Secrets (set with `wrangler secret put <NAME>` — never commit these):
#   PASSPHRASE_HASH        SHA-256 hex of the shared passphrase
