#   GOOGLE_CLIENT_SECRET   OAuth client secret
#   GOOGLE_REFRESH_TOKEN   OAuth refresh token (Production consent screen)
#
# Non-secret vars:
[vars]
ALLOWED_ORIGIN = "https://djsalman.dev"
